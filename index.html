<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For My Love ❤️</title>

  <!-- External CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Google Fonts (optional but recommended) -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script&display=swap" rel="stylesheet">

  <style>
    body {
      text-align: center;
      padding-top: 150px;
    }

    h1 {
      font-family: cursive;
    }

    p {
      font-family: 'Times New Roman', Times, serif;
    }

    .btn-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 50px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      font-family: cursive;
    }

    /* Falling Hearts Animation */
    .heart {
      position: fixed;
      font-size: 20px;
      animation: fall 3s linear forwards;
    }

    @keyframes fall {
      0% {
        transform: translateY(-50px);
        opacity: 1;
      }

      100% {
        transform: translateY(100vh);
        opacity: 0;
      }
    }

    /* 📱 Extra Small Devices */
    @media (max-width: 400px) {
      .btn-container {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }

    .heart-fall {
      position: fixed;
      top: -20px;
      font-size: 20px;
      animation: fall 3s linear forwards;
      pointer-events: none;
    }

    @keyframes fall {
      0% {
        transform: translateY(-20px);
        opacity: 1;
      }

      100% {
        transform: translateY(100vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <h1>For My Husband ❤️</h1>
  <p>I made something special just for you..</p>

  <!-- Audio -->
  <audio id="music">
    <source src="audio1.mp3" type="audio/mp3">
  </audio>

  <!-- Buttons -->
  <div class="btn-container">
    <button onclick="startMusic()">Tap Here ❤️</button>

    <a href="memories.html">
      <button>Start Our Story ❤️</button>
    </a>
  </div>

  <!-- External JS -->
  <script src="script.js"></script>

  <!-- Inline JS -->

  <script>
    let heartInterval; // prevent multiple intervals

    function startMusic() {
      let music = document.getElementById("music");

      // 🔊 ensure play works
      music.currentTime = 0;
      music.play().catch(() => {
        console.log("Autoplay blocked");
      });

      // 💖 start hearts only once
      if (!heartInterval) {
        heartInterval = setInterval(createHeart, 200);
      }
    }

    function createHeart() {
      let heart = document.createElement("div");
      heart.className = "heart-fall";

      // 💙🖤 Blue + Black hearts
      const hearts = ["💙", "🖤"];
      heart.innerText = hearts[Math.floor(Math.random() * hearts.length)];

      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = (Math.random() * 20 + 15) + "px";

      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 3000);
    }
  </script>


</body>

</html>
