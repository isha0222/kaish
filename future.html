<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Future</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script&display=swap" rel="stylesheet">

<style>

/* BODY */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  overflow: hidden;
}

/* BLUR BACKGROUND */
body::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  background: url('ik4.jpg') no-repeat center/cover;
  filter: blur(8px);
  z-index: -1;
}

/* CONTENT */
.content {
  z-index: 1;
  padding: 20px;
}

/* HEADING */
h1 {
  font-family:cursive;
  font-size: clamp(28px, 6vw, 60px);
  color: white;
  text-shadow: 0 0 10px rgba(255,0,0,0.6);
  margin-bottom: 20px;
  animation: fadeIn 2s ease;
}

/* TEXT */
p {
  font-family: 'Times New Roman', Times, serif;
  font-size: clamp(16px, 4vw, 24px);
  color: white;
  text-shadow: 0 0 6px black;
  line-height: 1.7;
}

/* BUTTON */
button {
  margin-top: 25px;
  font-size: 18px;
  padding: 10px 25px;
  border-radius: 30px;
  border: none;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.08);
  background: #ff1a4d;
}

/* HEARTS */
.heart {
  position: fixed;
  bottom: -20px;
  animation: floatUp 6s linear;
  opacity: 0.9;

  text-shadow:
    0 0 10px currentColor,
    0 0 20px currentColor;
}

/* FLOAT */
@keyframes floatUp {
  0% { transform: translateY(0) scale(0.7); opacity: 0; }
  20% { opacity: 1; }
  100% { transform: translateY(-100vh) scale(1.2); opacity: 0; }
}

/* FADE */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px);}
  to { opacity: 1; transform: translateY(0);}
}

</style>
</head>

<body>

<div class="content">
  <h1>Our Future Together ❤️</h1>

  <p>
    I want to walk every path of life with you 🤍<br>
    Not just today… but forever 💖<br>

    In every smile, in every tear…<br>
    I promise I’ll always be there 🫶<br>

    No matter what happens in life…<br>
    I will never let go of your hand 🤝❤️<br>

    Because my future…<br>
    Starts and ends with you 💞✨
  </p>

  <a href="surprise.html">
    <button>Final Surprise ❤️</button>
  </a>
</div>

<script>

/* FLOATING HEARTS */
setInterval(() => {
  const heart = document.createElement("div");
  heart.innerHTML = "❤️";
  heart.className = "heart";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (12 + Math.random() * 20) + "px";

  /* COLORS */
  const colors = [
    "#ff4d6d",
    "#ff99aa",
    "#ff1a75",
    "#66ccff",
    "#00bfff"
  ];
  heart.style.color = colors[Math.floor(Math.random() * colors.length)];

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}, 300);

</script>

</body>
</html>
