<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Love 💖</title>

<style>

  html {
  overflow: hidden;
}
/* ---------------- BODY & BACKGROUND ---------------- */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  text-align: center;
  color: white;

  overflow: hidden;   /* 🔥 FULL scroll remove */
  height: 100vh;

  background: url(ik5.jpg);
  background-size: cover;
  background-position: center;
}
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background: url(ik5.jpg);
  background-size: cover;
  background-position: center;

  filter: blur(6px);
  z-index: -1;
}

/* ---------------- TEXT ---------------- */
h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 30px;
  margin: 5vh 0 2vh 0;
  letter-spacing: 1px;
  text-shadow: 0 3px 10px rgba(0,0,0,0.3);
  animation: fadeSlide 2s ease;
  padding-top: 150px;
}

p {
  font-family: 'Dancing Script', cursive;
  font-size: 20px;
  line-height: 1.4;
  margin: 0 5%;
}

/* ---------------- BUTTONS ---------------- */
button {
  transition: 0.3s;
  cursor: pointer;
}

button:hover {
  transform: scale(1.05);
}

.finalBtn {
  background: white;
  color: #ff4d6d;
  border: none;
  border-radius: 30px;
  font-size: 18px;
   padding:12px 20px;
  margin: 1vh 2vw;
  font-family: 'Great Vibes', cursive;
}

.noBtn {
  background: hotpink;
  color: white;
  border: none;
  font-size: 18px;
   padding:12px 20px;
  border-radius: 30px;
  position: absolute;
  font-family: 'Great Vibes', cursive;
  z-index: 10;
}

/* ---------------- HEARTS ---------------- */
/* HEARTS */
.heart{
  position: fixed;
  top: -20px;
  font-size: 2vw; /* Responsive size instead of fixed 22px */
  animation: fall 3s linear forwards;
}

/* FALL ANIMATION */
@keyframes fall{
  0% { transform: translateY(-20px); }
  100% { transform: translateY(100vh); }
}

/* Mobile adjustment */
@media (max-width: 600px){
  .heart{
    font-size: 5vw; /* slightly bigger on small screens */
  }
}

/* ---------------- SECRET PAGE ---------------- */
.secret-btn {
  position: fixed;
  bottom: 3vh;
  right: 3vw;
  padding: 8px 14px;
  border-radius: 20px;
  border: none;
  background: #ffffff;
  color: #ff4d6d;
  cursor: pointer;
  font-family: 'Great Vibes', cursive;
  font-size: 15px;
  z-index: 100;
}

.loader {
  position: fixed;
  width: 100%;
  height: 100%;
  top:0;
  left:0;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.6);
  font-size: 50px;
  animation: pulse 1s infinite;
  z-index: 999;
}

@keyframes pulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.3); }
}

.secret-page {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #ff758c, #ff7eb3, #7afcff);
  display: none;
  justify-content: center;
  align-items: center;
   z-index: 9999; /* 🔥 upar lai ja */
  padding: 2vw;
  box-sizing: border-box;
  overflow-y: hidden;
}


.container {
  background: white;
  padding: 20px;
  border-radius: 15px;
  width: 90%;
  max-width: 450px;
  height: 400px;            /* 🔥 increased height */
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  display: flex;
  flex-direction: column;
  gap: 10px;
  overflow: hidden;
  position: relative;
}


.side-buttons {
  display:flex;
  justify-content: space-around;
  gap:5px;
  flex-wrap: wrap;
  margin-bottom: 5px;
}

.switch-btn {
  padding: 6px 10px;
  border:none;
  border-radius:10px;
  background:#ff4d6d;
  color:white;
  cursor:pointer;
  font-size: 18px;    /* smaller */
  flex:1;
  min-width: 80px;
}

.message {
  flex: 1;
  overflow-y: auto;
  line-height: 1.6;
  font-size: 1rem;
  padding: 10px;
  color: black;
}


.close-btn {
  position:absolute;
  top:5px;
  right:8px;
  font-size: 1.2rem;
  background: rgba(0,0,0,0.1);
  padding:4px 8px;
  border-radius:50%;
  cursor:pointer;
}

.close-btn:hover {
  background:#ff4d6d;
  color:white;
}

/* PHOTO */
#loveMsg img {
  width: 240px;
  max-width: 250px;
  height: 290px;
  border-radius: 12px;
  margin: 5px 0;
}
#loveMsg button {
  margin:5px 2px;
  padding:5px 8px;
  font-size:12px;
}
.navBtn {
  margin: 5px 5px;
  padding: 6px 12px;
  border: none;
  border-radius: 20px;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  color: white;
  font-size: 12px;
  cursor: pointer;
}

.navBtn:hover {
  transform: scale(1.05);
  background: linear-gradient(135deg, #ff4d6d, #ff85a2);
}

/* MEDIA QUERIES */
@media(max-width: 600px){
  .container { width: 95%; padding: 3vw; }
  .switch-btn { font-size: 3.5vw; padding: 5px 8px; }
  .message, #loveMsg { font-size: 14px; }
  .close-btn { font-size: 4vw; }
}

</style>
</head>

/* PHOTO GALLERY */
let photos = ["i11.JPG","i12.JPG","ik1.jpg","ik7.jpg","ik8.jpg","ik12.jpg","ik13.jpg","ik14.jpg","k7.jpg"];
let index = 0;

function showPhoto(){
  document.getElementById("message").style.display = "none";
  document.getElementById("loveMsg").style.display = "block";
  index = 0;
  updatePhoto();
}

function updatePhoto(){
  document.getElementById("loveMsg").innerHTML =
  "<div style='text-align:center;'>"+
  "<img src='"+photos[index]+"'><br>"+
"<button class='navBtn' onclick='prevPhoto()'>💗 Prev</button>"+
"<button class='navBtn' onclick='nextPhoto()'>Next 💗</button>"+
  "</div>";
}

function nextPhoto(){
  index++;
  if(index >= photos.length) index = 0;
  updatePhoto();
}

function prevPhoto(){
  index--;
  if(index < 0) index = photos.length-1;
  updatePhoto();
}
</script>
